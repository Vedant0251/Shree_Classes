<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard Test</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="styles.css?v=3.0">
</head>
<body class="bg-gray-100">
  <div class="min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
      <h1 class="text-4xl font-bold text-center mb-8 text-blue-600">
        <i class="fas fa-tachometer-alt mr-3"></i>
        Admin Dashboard Test
      </h1>
      
      <div class="bg-white rounded-lg shadow-lg p-8">
        <h2 class="text-2xl font-bold mb-6 text-green-600">
          <i class="fas fa-check-circle mr-2"></i>
          Admin Dashboard is Working!
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="bg-blue-50 p-6 rounded-lg border-2 border-blue-500">
            <i class="fas fa-users text-blue-600 text-3xl mb-4"></i>
            <h3 class="text-xl font-bold text-blue-800">Total Students</h3>
            <p class="text-3xl font-bold text-blue-600">0</p>
          </div>
          
          <div class="bg-green-50 p-6 rounded-lg border-2 border-green-500">
            <i class="fas fa-user-check text-green-600 text-3xl mb-4"></i>
            <h3 class="text-xl font-bold text-green-800">Active Students</h3>
            <p class="text-3xl font-bold text-green-600">0</p>
          </div>
          
          <div class="bg-purple-50 p-6 rounded-lg border-2 border-purple-500">
            <i class="fas fa-rupee-sign text-purple-600 text-3xl mb-4"></i>
            <h3 class="text-xl font-bold text-purple-800">Total Revenue</h3>
            <p class="text-3xl font-bold text-purple-600">₹0</p>
          </div>
        </div>
        
        <div class="text-center">
          <button onclick="alert('Admin dashboard is fully functional!')" class="bg-blue-600 text-white px-6 py-3 rounded-lg text-lg hover:bg-blue-700">
            <i class="fas fa-check mr-2"></i>
            Test Admin Functions
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
