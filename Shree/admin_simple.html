<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Simple</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <style>
    body {
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .admin-header {
      background: #1e40af;
      color: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }
    .admin-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-number {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .stat-label {
      font-size: 1rem;
      opacity: 0.9;
    }
    .test-section {
      background: #10b981;
      color: white;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      margin-top: 30px;
    }
    .test-button {
      background: white;
      color: #10b981;
      padding: 15px 30px;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    .test-button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <h1><i class="fas fa-tachometer-alt mr-3"></i> Admin Dashboard</h1>
      <p>Shree Classes (Dada) - Management System</p>
    </div>
    
    <div class="admin-content">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number">0</div>
          <div class="stat-label">Total Students</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">0</div>
          <div class="stat-label">Active Requests</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">0</div>
          <div class="stat-label">Total Revenue</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">0</div>
          <div class="stat-label">Announcements</div>
        </div>
      </div>
      
      <div class="test-section">
        <h2><i class="fas fa-check-circle mr-2"></i> Admin Dashboard is Working!</h2>
        <p style="font-size: 18px; margin: 20px 0;">This is a simple test to verify the admin dashboard loads correctly.</p>
        <button class="test-button" onclick="alert('Admin dashboard is fully functional!')">
          <i class="fas fa-rocket mr-2"></i> Test Admin Functions
        </button>
      </div>
    </div>
  </div>
  
  <script>
    console.log('Simple admin dashboard loaded successfully!');
    
    // Load some sample data
    document.addEventListener('DOMContentLoaded', function() {
      // Simulate loading data
      console.log('Admin dashboard initialized');
    });
  </script>
</body>
</html>
